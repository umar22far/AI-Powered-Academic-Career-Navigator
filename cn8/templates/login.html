<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerNova — Login</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050810;
      --surface: #0d1220;
      --border: rgba(99,179,237,0.15);
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPan 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridPan {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; left: -150px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; right: -100px; animation-delay: 3s; }
    .orb-3 { width: 300px; height: 300px; background: #8b5cf6; top: 50%; left: 60%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(20px, 20px); }
    }

    /* Login card */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-card {
      background: rgba(13,18,32,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 0 60px rgba(59,130,246,0.1), 0 30px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(59,130,246,0.4); }
      50%       { box-shadow: 0 8px 48px rgba(59,130,246,0.7); }
    }

    .logo-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(90deg, #fff 0%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .logo-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      pointer-events: none;
      color: var(--muted);
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(99,179,237,0.2);
      border-radius: 12px;
      padding: 14px 16px 14px 48px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder { color: #475569; }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(59,130,246,0.06);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .form-input:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--accent);
    }

    /* Button */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.4);
      margin-top: 8px;
    }

    .btn-login:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.5);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* Error alert */
    .alert {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--danger);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .roles-hint {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .role-badge {
      font-size: 12px;
      color: #94a3b8;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="logo-area">
        <div class="logo-icon">🚀</div>
        <div class="logo-title">CareerNova</div>
        <div class="logo-subtitle">AI-Powered Academic & Career Navigator</div>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert">⚠️ {{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
            <span class="input-icon">👤</span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <span class="input-icon">🔒</span>
          </div>
        </div>

        <button class="btn-login" type="submit">Sign In →</button>
      </form>

      <hr class="divider" />

      <div style="text-align:center; font-size:14px; color:#64748b;">
        New student? <a href="{% url 'signup' %}" style="color:#60a5fa; text-decoration:none; font-weight:500;">Create an account →</a>
      </div>

      <div style="margin-top:12px;" class="roles-hint">
        <span class="role-badge">🎓 Student Portal</span>
        <span class="role-badge">📋 Teacher Dashboard</span>
        <span class="role-badge">🤖 AI Career Paths</span>
      </div>

    </div>
  </div>

  <script>
    // Auto-focus username input
    document.getElementById('username').focus();
  </script>
</body>
</html>
